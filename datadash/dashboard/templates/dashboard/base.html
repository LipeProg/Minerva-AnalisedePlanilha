<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}DataDash - Dashboard de Planilhas{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        nav {
            background-color: #34495e;
            display: flex;
            gap: 0;
            padding: 0 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: background-color 0.3s;
            border-bottom: 3px solid transparent;
        }

        nav a:hover {
            background-color: #2c3e50;
            border-bottom-color: #3498db;
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .mensagens {
            margin-bottom: 20px;
        }

        .mensagem {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid;
        }

        .mensagem.success {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .mensagem.error {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .mensagem.warning {
            background-color: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .card .valor {
            color: #2c3e50;
            font-size: 32px;
            font-weight: bold;
        }

        .graficos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .grafico {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grafico h3 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 16px;
        }

        .grafico canvas {
            max-height: 300px;
        }

        .tabela-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .tabela-container h3 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background-color: #ecf0f1;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 2px solid #bdc3c7;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }

        table tbody tr:hover {
            background-color: #f9f9f9;
        }

        form {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        form label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: bold;
        }

        form input[type="file"],
        form input[type="text"],
        form input[type="password"],
        form input[type="email"],
        form textarea,
        form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        form button,
        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        form button:hover,
        .btn:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-success {
            background-color: #27ae60;
        }

        .btn-success:hover {
            background-color: #229954;
        }

        .grupo-botoes {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .confirmacao-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }

        .confirmacao-box h2 {
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .confirmacao-box p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
            }

            nav a {
                padding: 10px 15px;
            }

            .cards-container {
                grid-template-columns: 1fr;
            }

            .graficos-container {
                grid-template-columns: 1fr;
            }

            main {
                margin: 15px auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 DataDash</h1>
        <nav>
            <a href="{% url 'dashboard:dashboard' %}">Dashboard</a>
            <a href="{% url 'dashboard:upload' %}">Upload</a>
            <a href="{% url 'dashboard:dados' %}">Dados</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
    </header>

    <main>
        {% if messages %}
            <div class="mensagens">
                {% for message in messages %}
                    <div class="mensagem {% if message.tags %}{{ message.tags }}{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block conteudo %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 DataDash - Dashboard de Planilhas | Projeto Acadêmico</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
